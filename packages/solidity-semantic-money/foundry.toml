[profile.default]
src = 'src'
out = 'out/default'
cache_path = 'out/default.cache'
libs = ['../../lib']
solc_version = '0.8.30'
evm_version = 'paris' # no PUSH0 for now
deny_warnings = true
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    '@superfluid-finance/solidity-semantic-money/src/=src/',
    '@openzeppelin/=../../lib/openzeppelin-contracts/',
    'ds-test/=../../lib/forge-std/lib/ds-test/src/',
    'forge-std/=../../lib/forge-std/src/']

[profile.test]
test = 'test'
out = 'out/test'
cache_path = 'out/test.cache'
via_ir = true # though this is so slow!

[profile.test.fuzz]
runs = 1000

[lint]
exclude_lints = [
    "erc20-unchecked-transfer",
    "unsafe-typecast",
]
