[profile.default]
src = 'contracts'
test = 'test'
libs = ['../../../lib']
allow_paths = ['sf-ethereum', '../../solidity-semantic-money']
solc_version = "0.8.30"
evm_version = 'cancun'
optimizer = true
optimizer_runs = 200
remappings = [
    '@superfluid-finance/solidity-semantic-money/src/=../../solidity-semantic-money/src/',
    '@superfluid-finance/ethereum-contracts/contracts/=sf-ethereum/contracts/',
    '@superfluid-finance/ethereum-contracts/test/=sf-ethereum/test/',
    '@openzeppelin-v5/=../../../lib/openzeppelin-contracts/',
    '@openzeppelin/=../../../lib/openzeppelin-contracts/',
    'ds-test/=../../../lib/forge-std/lib/ds-test/src/',
    'forge-std/=../../../lib/forge-std/src/']
out = 'out/default'

[profile.ci]
offline = true

[profile.ci.fuzz]
runs = 1000
