[profile.default]
src = 'contracts'
test = 'test/foundry'
script = 'foundry-scripts'
libs = ['lib']
solc_version = "0.8.35"
# keep in sync with [lint] ignore — solc warnings from mocks/tests are non-actionable
ignored_warnings_from = [
    "contracts/mocks/",
    "test/",
    "contracts/utils/SuperfluidFrameworkDeployer.t.sol",
    "contracts/utils/SuperfluidFrameworkDeploymentSteps.t.sol",
]
#deny_warnings = true
# keep in sync with truffle-config.js
evm_version = 'cancun'
optimizer = true
optimizer_runs = 200
remappings = [
    '@superfluid-finance/ethereum-contracts/contracts/=contracts/',
    '@superfluid-finance/ethereum-contracts/test/=test/',
    '@superfluid-finance/solidity-semantic-money/src/=lib/solidity-semantic-money/src/',
    '@openzeppelin-v5/=lib/openzeppelin-contracts/',
    'aave-v3/=lib/aave-v3/',
    'ds-test/=lib/forge-std/lib/ds-test/src/',
    'forge-std/=lib/forge-std/src/']
out = 'build/foundry/default'
fs_permissions = [
    { access = "read-write", path = ".tmp" }
]

[invariant]
runs = 2000
depth = 10
fail_on_revert = false

[fmt]
bracket_spacing = true
tab_width = 4
line_length = 120
int_types = "preserve"
quote_style = "double"
wrap_comments = true

[profile.ci]
offline = true
verbosity = 2

[profile.ci.fuzz]
runs = 1000

[lint]
lint_on_build = false
ignore = [
    "test/**",
    "contracts/mocks/**",
    "contracts/**/*.t.sol",
]
exclude_lints = [
    "incorrect-shift",
    "divide-before-multiply",
]
